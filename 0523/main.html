<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀 메인 페이지</title>
    <style>
        body { font-family: sans-serif; padding: 50px; text-align: center; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; }
        h1 { color: #333; }
    </style>
</head>
<body>

    <h1>🎉 환영합니다! <span id="userGreeting">로딩 중...</span>님</h1>
    <p>여기는 인증된 유저만 볼 수 있는 특별한 웹 공간입니다.</p>
    
    <button id="btnLogout">로그아웃</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBUJ0dcDHhXDYlu1IraDaNXjQkl90mj6OY",
      authDomain: "space-f6781.firebaseapp.com",
      projectId: "space-f6781",
      storageBucket: "space-f6781.firebasestorage.app",
      messagingSenderId: "1042149824565",
      appId: "1:1042149824565:web:56b403c8e0e1c6b7eb397c",
      measurementId: "G-0JXD1HB7MW"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 로그인 상태 감시 및 이름 찾아오기
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // 1. 현재 로그인한 계정의 가짜 이메일에서 아이디만 추출 (예: yukijun)
            const currentUsername = user.email.split('@')[0];
            
            // 2. 데이터베이스(users 컬렉션)에서 username 필드가 현재 아이디와 일치하는 문서(이름)를 찾습니다.
            const usersRef = collection(db, "users");
            const q = query(usersRef, where("username", "==", currentUsername));
            
            getDocs(q).then((querySnapshot) => {
                if (!querySnapshot.empty) {
                    // 문서가 존재하면 그 문서의 ID(즉, 가입할 때 썼던 유저 이름)를 가져옵니다.
                    querySnapshot.forEach((doc) => {
                        document.getElementById('userGreeting').innerText = doc.id; // '유기준' 노출
                    });
                } else {
                    document.getElementById('userGreeting').innerText = currentUsername; // 못 찾으면 아이디라도 노출
                }
            }).catch((error) => {
                console.error("이름을 불러오는 중 오류 발생:", error);
                document.getElementById('userGreeting').innerText = "사용자";
            });

        } else {
            alert("로그인이 필요한 페이지입니다!");
            window.location.href = "index.html";
        }
    });

    // 로그아웃
    document.getElementById('btnLogout').addEventListener('click', () => {
        signOut(auth).then(() => {
            window.location.href = "index.html";
        });
    });
</script>
</body>
</html>
